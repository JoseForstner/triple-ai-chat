<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triple AI Chat</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f11;color:#e8e8e8;height:100vh;display:flex;flex-direction:column}
:root{--claude:#7F77DD;--gpt:#1D9E75;--user:#D85A30;--bg:#0f0f11;--bg2:#1a1a1f;--bg3:#222228;--border:rgba(255,255,255,0.08);--text:#e8e8e8;--text2:#999}
.header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);flex-shrink:0}
.header-title{font-size:15px;font-weight:600}
.badges{display:flex;gap:8px}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}
.bc{background:rgba(127,119,221,0.2);color:#a9a3f0;border:1px solid rgba(127,119,221,0.3)}
.bg{background:rgba(29,158,117,0.2);color:#4dc99a;border:1px solid rgba(29,158,117,0.3)}
.setup{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.card{width:100%;max-width:480px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:28px;display:flex;flex-direction:column;gap:16px}
.card-title{font-size:18px;font-weight:600}
.card-sub{font-size:13px;color:var(--text2);line-height:1.5;margin-top:4px}
.kg{display:flex;flex-direction:column;gap:6px}
.kl{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:6px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ki{width:100%;padding:10px 12px;font-size:13px;font-family:monospace;border:1px solid var(--border);border-radius:8px;background:var(--bg3);color:var(--text)}
.ki:focus{outline:none;border-color:rgba(127,119,221,0.5)}
.ta{width:100%;padding:10px 12px;font-size:12px;font-family:inherit;border:1px solid var(--border);border-radius:8px;background:var(--bg3);color:var(--text);resize:vertical;min-height:90px;line-height:1.5}
.ta:focus{outline:none;border-color:rgba(127,119,221,0.5)}
.sbtn{padding:12px;background:var(--claude);color:white;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.sbtn:hover{opacity:0.9}
.chat{flex:1;display:flex;flex-direction:column;overflow:hidden}
.msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.msg{display:flex;flex-direction:column;gap:6px}
.mh{display:flex;align-items:center;gap:8px}
.av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:white;flex-shrink:0}
.mn{font-size:12px;font-weight:600}
.mt{font-size:10px;color:var(--text2)}
.mb{padding:11px 14px;border-radius:12px;font-size:13px;line-height:1.65;border:1px solid var(--border);background:var(--bg2);white-space:pre-wrap;word-break:break-word;max-width:90%}
.ub{background:rgba(127,119,221,0.15);border-color:rgba(127,119,221,0.25)}
.tk{color:var(--text2);font-style:italic;font-size:12px}
.eb{background:rgba(226,75,74,0.1);border-color:rgba(226,75,74,0.3);color:#f09595}
.note{text-align:center;font-size:11px;color:var(--text2);padding:4px 0}
.ia{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:flex-end;background:var(--bg2);flex-shrink:0}
.iw{flex:1;display:flex;flex-direction:column;gap:8px}
.ci{width:100%;padding:10px 14px;font-size:13px;font-family:inherit;border:1px solid var(--border);border-radius:10px;background:var(--bg3);color:var(--text);resize:none;min-height:42px;max-height:120px;line-height:1.5}
.ci:focus{outline:none;border-color:rgba(127,119,221,0.4)}
.cr{display:flex;align-items:center;justify-content:space-between}
.dt{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text2);cursor:pointer}
.tsw{width:30px;height:17px;border-radius:9px;background:var(--bg3);border:1px solid var(--border);position:relative;transition:background 0.2s;flex-shrink:0}
.tsw.on{background:var(--claude);border-color:var(--claude)}
.tk2{width:13px;height:13px;border-radius:50%;background:white;position:absolute;top:1px;left:1px;transition:left 0.2s}
.tsw.on .tk2{left:14px}
.hint{font-size:10px;color:var(--text2)}
.sndb{padding:10px 18px;background:var(--claude);color:white;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;height:42px;flex-shrink:0}
.sndb:disabled{opacity:0.35;cursor:not-allowed}
</style>
</head>
<body>
<div class="header">
  <span class="header-title">Triple AI Chat</span>
  <div class="badges"><span class="badge bc">Claude</span><span class="badge bg">ChatGPT</span></div>
</div>
<div id="main"></div>
<script>
var ck='',ok='',ctx='',hist=[],debate=true,busy=false;
function init(){
  document.getElementById('main').innerHTML='<div class="setup"><div class="card"><div><div class="card-title">Bienvenido</div><div class="card-sub">Conversa con Claude y ChatGPT al mismo tiempo.</div></div><div class="kg"><div class="kl"><span class="dot" style="background:#7F77DD"></span>Anthropic API Key</div><input class="ki" type="password" id="ck" placeholder="sk-ant-..."/></div><div class="kg"><div class="kl"><span class="dot" style="background:#1D9E75"></span>OpenAI API Key</div><input class="ki" type="password" id="ok" placeholder="sk-proj-..."/></div><div class="kg"><div class="kl">Contexto del proyecto (opcional)</div><textarea class="ta" id="ctx" placeholder="Pega aqui el contexto..."></textarea></div><button class="sbtn" onclick="go()">Iniciar conversacion</button></div></div>';
}
function go(){
  ck=document.getElementById('ck').value.trim();
  ok=document.getElementById('ok').value.trim();
  ctx=document.getElementById('ctx').value.trim();
  if(!ck||!ok){alert('Ingresa ambas API keys.');return;}
  document.getElementById('main').innerHTML='<div class="chat"><div class="msgs" id="msgs"></div><div class="ia"><div class="iw"><textarea class="ci" id="inp" placeholder="Escribe tu mensaje..." rows="1" onkeydown="hk(event)"></textarea><div class="cr"><div class="dt" onclick="td()"><div class="tsw on" id="tsw"><div class="tk2"></div></div><span id="tl">Modo debate activado</span></div><span class="hint">Shift+Enter nueva linea</span></div></div><button class="sndb" id="sb" onclick="send()">Enviar</button></div></div>';
  if(ctx)note('Contexto del proyecto cargado.');
}
function td(){debate=!debate;document.getElementById('tsw').className='tsw'+(debate?' on':'');document.getElementById('tl').textContent=debate?'Modo debate activado':'Modo independiente';}
function hk(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}
function t(){return new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});}
function note(x){var d=document.createElement('div');d.className='note';d.textContent=x;document.getElementById('msgs').appendChild(d);sc();}
function am(role,text,tk,eb){
  var cols={user:'#D85A30',claude:'#7F77DD',gpt:'#1D9E75'};
  var inits={user:'TU',claude:'AI',gpt:'GP'};
  var names={user:'Tu',claude:'Claude',gpt:'ChatGPT'};
  var d=document.createElement('div');d.className='msg';
  var id='m'+Date.now()+role;d.id=id;
  d.innerHTML='<div class="mh"><div class="av" style="background:'+cols[role]+'">'+inits[role]+'</div><span class="mn" style="color:'+cols[role]+'">'+names[role]+'</span><span class="mt">'+t()+'</span></div><div class="mb'+(role==='user'?' ub':'')+(tk?' tk':'')+(eb?' eb':'')+'">'+text+'</div>';
  document.getElementById('msgs').appendChild(d);sc();return id;
}
function um(id,text,eb){var d=document.getElementById(id);if(!d)return;var b=d.querySelector('.mb');b.classList.remove('tk');if(eb)b.classList.add('eb');b.textContent=text;sc();}
function sc(){var m=document.getElementById('msgs');if(m)m.scrollTop=m.scrollHeight;}
async function cl(msgs,ex){
  var sys='Eres Claude en una conversacion grupal. Se directo y util. Responde en el idioma del usuario.'+(ctx?'

CONTEXTO:
'+ctx:'')+(ex?'

'+ex:'');
  var r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':ck,'anthropic-version':'2023-06-01'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system:sys,messages:msgs})});
  if(!r.ok){var e=await r.json();throw new Error('Claude: '+(e.error&&e.error.message?e.error.message:'Error'));}
  var d=await r.json();return d.content[0].text;
}
async function og(msgs,ex){
  var sys='Eres ChatGPT en una conversacion grupal. Se directo y util. Responde en el idioma del usuario.'+(ctx?'

CONTEXTO:
'+ctx:'')+(ex?'

'+ex:'');
  var om=[{role:'system',content:sys}].concat(msgs.map(function(m){return{role:m.role==='assistant'?'assistant':'user',content:m.content};}));
  var r=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+ok},body:JSON.stringify({model:'gpt-4o',max_tokens:1000,messages:om})});
  if(!r.ok){var e=await r.json();throw new Error('ChatGPT: '+(e.error&&e.error.message?e.error.message:'Error'));}
  var d=await r.json();return d.choices[0].message.content;
}
async function send(){
  if(busy)return;
  var inp=document.getElementById('inp');
  var text=inp.value.trim();if(!text)return;
  busy=true;inp.value='';
  document.getElementById('sb').disabled=true;
  am('user',text,false,false);
  hist.push({role:'user',content:text});
  var ci=am('claude','Escribiendo...',true,false);
  var gi=am('gpt','Escribiendo...',true,false);
  try{
    if(debate){
      var cr=await cl(hist);um(ci,cr,false);
      var ex='La respuesta de Claude fue:
"'+cr+'"

Puedes comentarla si aporta valor.';
      var gr=await og(hist,ex);um(gi,gr,false);
      hist.push({role:'assistant',content:'Claude: '+cr+'

ChatGPT: '+gr});
    }else{
      var res=await Promise.all([cl(hist),og(hist)]);
      um(ci,res[0],false);um(gi,res[1],false);
      hist.push({role:'assistant',content:'Claude: '+res[0]+'

ChatGPT: '+res[1]});
    }
  }catch(e){um(ci,e.message,true);um(gi,'',false);}
  busy=false;document.getElementById('sb').disabled=false;inp.focus();
}
init();
</script>
</body>
</html>
